<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AIClinic</title>
    <style>
        body {
            font-family: "Yu Gothic", "Meiryo", sans-serif;
            margin: 0;
            background: #f5f7fa;
            color: #222;
        }
        .container {
            width: 1000px;
            margin-left: 80px;
            padding: 24px 0 60px 0;
        }
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            font-size: 15px;
            line-height: 1.5;
            padding: 10px;
            box-sizing: border-box;
        }
        button {
            font-size: 15px;
            padding: 8px 16px;
            margin: 6px 6px 6px 0;
            cursor: pointer;
        }
        .start {
            background: #0b72e7;
            color: white;
            border: none;
            border-radius: 6px;
        }
        .stop {
            background: #d93025;
            color: white;
            border: none;
            border-radius: 6px;
        }
        .copy {
            background: #198754;
            color: white;
            border: none;
            border-radius: 6px;
        }
        .recording {
            color: #d93025;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>AIClinic Ver.0.8：分割文字起こし</h1>

    <div class="card">
        <h2>診察録音</h2>
        <button type="button" id="startBtn" class="start">🎤 診察開始</button>
        <button type="button" id="stopBtn" class="stop" disabled>■ 停止</button>
        <span id="status"></span>
    </div>

    <form id="soapForm" method="post">
        {% csrf_token %}

        <div class="card">
            <h2>診察メモ / リアルタイム文字起こし</h2>
            <textarea id="medicalNote" name="medical_note" rows="10">{{ medical_note }}</textarea>
            <br>
            <button type="submit">Encounter JSON ＋ SOAP作成</button>
        </div>
    </form>

    <div class="card">
        <h2>SOAP</h2>
        <textarea id="soap_result" rows="18">{{ soap_result }}</textarea>
        <br>
        <button type="button" class="copy" onclick="copySOAP()">SOAPをコピー</button>
        <p id="copy_message"></p>
    </div>

    <div class="card">
        <details>
            <summary>Encounter JSONを表示</summary>
            <textarea rows="18">{{ encounter_json }}</textarea>
        </details>
    </div>

</div>

<script>
let mediaRecorder;
let stream;
let isRecording = false;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const statusText = document.getElementById("status");
const medicalNote = document.getElementById("medicalNote");

function getCsrfToken() {
    const name = "csrftoken";
    const cookies = document.cookie.split(";");
    for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith(name + "=")) {
            return decodeURIComponent(cookie.substring(name.length + 1));
        }
    }
    return "";
}

async function sendAudioChunk(blob) {
    if (!blob || blob.size < 2000) {
        return;
    }

    const formData = new FormData();
    formData.append("audio_file", blob, "chunk.webm");

    const response = await fetch("/transcribe_chunk/", {
        method: "POST",
        headers: {
            "X-CSRFToken": getCsrfToken()
        },
        body: formData
    });

    const data = await response.json();

    if (data.transcript) {
        medicalNote.value += data.transcript + "\n";
    }
}

startBtn.onclick = async function() {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    isRecording = true;

    const options = { mimeType: "audio/webm;codecs=opus" };
    mediaRecorder = new MediaRecorder(stream, options);

    mediaRecorder.ondataavailable = async function(event) {
        if (event.data && event.data.size > 0) {
            statusText.innerText = "文字起こし中...";
            await sendAudioChunk(event.data);
            if (isRecording) {
                statusText.innerText = "録音中...";
            }
        }
    };

    mediaRecorder.onstop = function() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }

        isRecording = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        statusText.innerText = "録音停止。SOAP作成ボタンを押してください。";
        statusText.className = "";
    };

    // 10秒ごとに音声チャンク作成
    mediaRecorder.start(10000);

    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusText.innerText = "録音中...";
    statusText.className = "recording";
};

stopBtn.onclick = function() {
    isRecording = false;

    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.ondataavailable = null;  // 最後の短い壊れたチャンクを送らない
        mediaRecorder.stop();
    }

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    startBtn.disabled = false;
    stopBtn.disabled = true;
    statusText.innerText = "録音停止。SOAP作成ボタンを押してください。";
    statusText.className = "";
};
</script>

</body>
</html>
