<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AIClinic</title>
</head>
<body>

<h1>AIClinic Ver.0.4：Encounter JSON Engine</h1>

<form method="post">
    {% csrf_token %}

    <h2>診察メモ</h2>
    <textarea name="medical_note" rows="10" cols="100">{{ medical_note }}</textarea>
    <br>

    <button type="submit">Encounter JSON ＋ SOAP作成</button>
</form>

<h2>Encounter JSON</h2>
<textarea rows="18" cols="100">{{ encounter_json }}</textarea>

<h2>SOAP</h2>
<textarea id="soap_result" rows="18" cols="100">{{ soap_result }}</textarea>
<br>

<button type="button" onclick="copySOAP()">SOAPをコピー</button>
<p id="copy_message"></p>

<script>
function copySOAP() {
    const soapText = document.getElementById("soap_result");
    soapText.select();
    soapText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(soapText.value);

    document.getElementById("copy_message").innerText = "SOAPをコピーしました。";
}
</script>

</body>
</html>
