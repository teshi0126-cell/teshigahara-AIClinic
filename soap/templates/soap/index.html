{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AIClinic</title>
    <link rel="stylesheet" href="{% static 'soap/css/ai_clinic.css' %}">
</head>
<body>

<div class="container">

    <h1>AIClinic Sprint 13：診療支援チェック強化</h1>

    <div class="card">
        <h2>診察録音</h2>
        <button type="button" id="startBtn" class="start">🎤 診察開始</button>
        <button type="button" id="stopBtn" class="stop" disabled>■ 停止</button>
        <span id="status"></span>
    </div>

    <form id="soapForm" method="post">
        {% csrf_token %}

        <div class="card">
            <h2>診察メモ / 文字起こし</h2>
            <textarea id="medicalNote" name="medical_note" rows="10">{{ medical_note }}</textarea>
            <br>
            <button type="submit">手動でSOAP作成</button>
        </div>
    </form>

    <div class="card">
    <h2>診療支援チェック</h2>
    <div id="clinical_checks">
        {% for check in clinical_checks %}
            <div class="check-item {{ check.level }}">
                <span class="check-category">[{{ check.category }}]</span>
                <label>
                    <input type="checkbox" {% if check.checked %}checked{% endif %}>
                    {{ check.item }}
                </label>
            </div>
        {% endfor %}
    </div>
</div>

    <div class="card">
        <h2>SOAP</h2>
        <textarea id="soap_result" rows="18">{{ soap_result }}</textarea>
        <br>
        <button type="button" class="copy" onclick="copySOAP()">SOAPをコピー</button>
        <p id="copy_message"></p>
    </div>

    <div class="card">
        <details>
            <summary>Encounter JSONを表示</summary>
            <textarea id="encounter_json" rows="18">{{ encounter_json }}</textarea>
        </details>
    </div>

</div>

<script src="{% static 'soap/js/recorder.js' %}"></script>

</body>
</html>
